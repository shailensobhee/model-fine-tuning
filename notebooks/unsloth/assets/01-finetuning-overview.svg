vetica, Arial, sans-serif'>a few hundred to</text><text x='430.0' y='162' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>a few thousand</text><text x='430.0' y='180' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>clean examples</text><rect x='616' y='74' width='220' height='130' rx='12' fill='#d1fae5' stroke='#059669' stroke-width='1.5' filter='url(#sh)'/><text x='726.0' y='114' font-size='17' fill='#059669' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Fine-tuned</text><text x='726.0' y='138' font-size='17' fill='#059669' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>model</text><text x='726.0' y='170' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>adapted to your</text><text x='726.0' y='188' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>task, tone, format</text><line x1='254' y1='139.0' x2='308' y2='139.0' stroke='#64748b' stroke-width='2.5' marker-end='url(#arrow)'/><line x1='550' y1='139.0' x2='604' y2='139.0' stroke='#64748b' stroke-width='2.5' marker-end='url(#arrow)'/><text x='430.0' y='246' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Same skill, now specialized. Cheaper and more reliable than a giant prompt.</text></svg>