<svg xmlns='http://www.w3.org/2000/svg' width='860' height='250' viewBox='0 0 860 250'><rect width='860' height='250' fill='#ffffff'/><defs><filter id='sh' x='-20%' y='-20%' width='140%' height='140%'><feDropShadow dx='0' dy='1.5' stdDeviation='2' flood-color='#0f172a' flood-opacity='0.12'/></filter><marker id='arrow' markerWidth='10' markerHeight='10' refX='7' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L7,3 L0,6 Z' fill='#64748b'/></marker><marker id='arrowr' markerWidth='10' markerHeight='10' refX='7' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L7,3 L0,6 Z' fill='#ed1c24'/></marker></defs><text x='430.0' y='34' font-size='20' fill='#1e293b' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Launching Studio: two moves</text><rect x='24' y='70' width='250' height='140' rx='12' fill='#0f172a' stroke='#0f172a' stroke-width='1.5' filter='url(#sh)'/><text x='149.0' y='100' font-size='14' fill='#e2e8f0' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>1. In a terminal</text><rect x='42' y='116' width='214' height='40' rx='6' fill='#020617' stroke='#334155'/><text x='54' y='140' font-size='11.5' fill='#4ade80' font-family='Consolas, monospace' text-anchor='start'>unsloth studio</text><text x='54' y='154' font-size='11.5' fill='#4ade80' font-family='Consolas, monospace' text-anchor='start'>  -H 0.0.0.0 -p 8888</text><text x='149.0' y='196' font-size='11.5' fill='#94a3b8' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>File > New > Terminal</text><rect x='305' y='70' width='250' height='140' rx='12' fill='#fef3c7' stroke='#d97706' stroke-width='1.5' filter='url(#sh)'/><text x='430.0' y='100' font-size='14' fill='#d97706' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>2. Copy the secure link</text><rect x='323' y='120' width='214' height='34' rx='6' fill='#ffffff' stroke='#d97706'/><text x='430.0' y='141' font-size='11' fill='#1e293b' font-family='Consolas, monospace' text-anchor='middle'>https://....trycloudflare.com</text><text x='430.0' y='184' font-size='11.5' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>"Use the secure link via</text><text x='430.0' y='198' font-size='11.5' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Cloudflare instead"</text><rect x='586' y='70' width='250' height='140' rx='12' fill='#d1fae5' stroke='#059669' stroke-width='1.5' filter='url(#sh)'/><text x='711.0' y='100' font-size='14' fill='#059669' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>3. Open in your browser</text><rect x='616' y='116' width='190' height='60' rx='6' fill='#ffffff' stroke='#059669'/><rect x='616' y='116' width='190' height='14' rx='6' fill='#d1fae5'/><circle cx='626' cy='123' r='2.5' fill='#059669'/><text x='711.0' y='158' font-size='12.5' fill='#059669' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Unsloth Studio</text><text x='711.0' y='198' font-size='11.5' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>log in, then train</text><line x1='278' y1='140.0' x2='299' y2='140.0' stroke='#64748b' stroke-width='2.5' marker-end='url(#arrow)'/><line x1='559' y1='140.0' x2='580' y2='140.0' stroke='#64748b' stroke-width='2.5' marker-end='url(#arrow)'/><text x='430.0' y='238' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Prefer the Cloudflare link over the raw 0.0.0.0:8888 address.</text></svg>