63eb' stroke-width='1.5' filter='url(#sh)'/><circle cx='754.0' cy='108' r='16' fill='#2563eb'/><text x='754.0' y='113' font-size='15' fill='#ffffff' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>5</text><text x='754.0' y='144' font-size='14' fill='#1e293b' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Compare</text><text x='754.0' y='166' font-size='11.5' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>chat vs base</text><text x='430.0' y='224' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Under the hood this is the same SFT / LoRA / QLoRA, just point-and-click.</text></svg>