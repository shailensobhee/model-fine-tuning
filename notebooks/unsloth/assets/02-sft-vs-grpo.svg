<svg xmlns='http://www.w3.org/2000/svg' width='860' height='340' viewBox='0 0 860 340'><rect width='860' height='340' fill='#ffffff'/><defs><filter id='sh' x='-20%' y='-20%' width='140%' height='140%'><feDropShadow dx='0' dy='1.5' stdDeviation='2' flood-color='#0f172a' flood-opacity='0.12'/></filter><marker id='arrow' markerWidth='10' markerHeight='10' refX='7' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L7,3 L0,6 Z' fill='#64748b'/></marker><marker id='arrowr' markerWidth='10' markerHeight='10' refX='7' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L7,3 L0,6 Z' fill='#ed1c24'/></marker></defs><text x='430.0' y='34' font-size='20' fill='#1e293b' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Two families of fine-tuning</text><rect x='24' y='60' width='388' height='250' rx='12' fill='#e0ecff' stroke='#2563eb' stroke-width='1.5' filter='url(#sh)'/><text x='218.0' y='94' font-size='17' fill='#2563eb' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>1. Supervised Fine-Tuning (SFT)</text><text x='218.0' y='118' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Show the model the right answers</text><rect x='52' y='130' width='332' height='26' rx='6' fill='#ffffff' stroke='#cbd5e1' stroke-width='1'/><text x='68' y='148' font-size='12' fill='#2563eb' font-weight='700' text-anchor='start' font-family='Segoe UI, Helvetica, Arial, sans-serif'>instruction</text><text x='368' y='148' font-size='12' fill='#1e293b' font-weight='400' text-anchor='end' font-family='Segoe UI, Helvetica, Arial, sans-serif'>"Translate to French"</text><rect x='52' y='164' width='332' height='26' rx='6' fill='#ffffff' stroke='#cbd5e1' stroke-width='1'/><text x='68' y='182' font-size='12' fill='#2563eb' font-weight='700' text-anchor='start' font-family='Segoe UI, Helvetica, Arial, sans-serif'>input</text><text x='368' y='182' font-size='12' fill='#1e293b' font-weight='400' text-anchor='end' font-family='Segoe UI, Helvetica, Arial, sans-serif'>"Good morning"</text><rect x='52' y='198' width='332' height='26' rx='6' fill='#ffffff' stroke='#cbd5e1' stroke-width='1'/><text x='68' y='216' font-size='12' fill='#2563eb' font-weight='700' text-anchor='start' font-family='Segoe UI, Helvetica, Arial, sans-serif'>output</text><text x='368' y='216' font-size='12' fill='#1e293b' font-weight='400' text-anchor='end' font-family='Segoe UI, Helvetica, Arial, sans-serif'>"Bonjour"</text><text x='218.0' y='270' font-size='12' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Model learns to imitate the gold output.</text><text x='218.0' y='290' font-size='13' fill='#2563eb' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>The workhorse. Start here.</text><rect x='448' y='60' width='388' height='250' rx='12' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.5' filter='url(#sh)'/><text x='642.0' y='94' font-size='17' fill='#7c3aed' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>2. GRPO (reinforcement)</text><text x='642.0' y='118' font-size='13' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Score answers, reward the best</text><rect x='476' y='142' width='86' height='30' rx='6' fill='#ffffff' stroke='#cbd5e1'/><text x='519' y='161' font-size='12' fill='#1e293b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>prompt</text><rect x='616' y='138' width='88' height='24' rx='6' fill='#ffffff' stroke='#cbd5e1'/><text x='660' y='154' font-size='11' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>answer 1</text><line x1='562' y1='157' x2='614' y2='150' stroke='#64748b' stroke-width='1.5' marker-end='url(#arrow)'/><rect x='616' y='168' width='88' height='24' rx='6' fill='#ffffff' stroke='#cbd5e1'/><text x='660' y='184' font-size='11' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>answer 2</text><line x1='562' y1='157' x2='614' y2='180' stroke='#64748b' stroke-width='1.5' marker-end='url(#arrow)'/><rect x='616' y='198' width='88' height='24' rx='6' fill='#ffffff' stroke='#cbd5e1'/><text x='660' y='214' font-size='11' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>answer 3</text><line x1='562' y1='157' x2='614' y2='210' stroke='#64748b' stroke-width='1.5' marker-end='url(#arrow)'/><rect x='726' y='156' width='74' height='30' rx='6' fill='#ede9fe' stroke='#7c3aed'/><text x='763' y='175' font-size='12' fill='#7c3aed' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>reward</text><line x1='704' y1='150' x2='724' y2='171' stroke='#64748b' stroke-width='1.2' marker-end='url(#arrow)'/><line x1='704' y1='180' x2='724' y2='171' stroke='#64748b' stroke-width='1.2' marker-end='url(#arrow)'/><line x1='704' y1='210' x2='724' y2='171' stroke='#64748b' stroke-width='1.2' marker-end='url(#arrow)'/><text x='642.0' y='270' font-size='12' fill='#64748b' font-weight='400' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Push the model toward higher reward.</text><text x='642.0' y='290' font-size='13' fill='#7c3aed' font-weight='700' text-anchor='middle' font-family='Segoe UI, Helvetica, Arial, sans-serif'>Great for reasoning. Use after SFT.</text></svg>